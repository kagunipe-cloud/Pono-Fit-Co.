<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5abd78"/>
      <stop offset="50%" stop-color="#a2f4b1"/>
      <stop offset="100%" stop-color="#7dd994"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd994"/>
      <stop offset="50%" stop-color="#a2f4b1"/>
      <stop offset="100%" stop-color="#6ee89f"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1c1a" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#1a1c1a" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#121412" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#a2f4b1" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background placeholder (replace with your gym photo in Squarespace or embed image below) -->
  <rect width="1080" height="1080" fill="#2a2d2a"/>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="8" fill="url(#topBar)"/>

  <text x="52" y="72" fill="#a2f4b1" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" letter-spacing="4">PONO FIT CO.</text>
  <text x="52" y="168" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="400">Small-Group</text>
  <text x="52" y="232" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="400">Training</text>
  <text x="52" y="288" fill="#ebebeb" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-style="italic">Train with your friends, and split the bill</text>

  <rect x="52" y="330" width="620" height="64" rx="14" fill="url(#pill)" filter="url(#shadow)"/>
  <text x="76" y="372" fill="#0f1a12" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">$100/hour (total) · up to 4 people</text>

  <rect x="52" y="640" width="976" height="388" rx="20" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>
  <text x="88" y="698" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="32">How it works</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="88" y="724" width="36" height="36" rx="10" fill="#a2f4b1"/>
    <text x="106" y="748" fill="#0f1a12" font-size="18" font-weight="700" text-anchor="middle">1</text>
    <text x="140" y="742" fill="#ffffff" font-size="22" font-weight="700">Book a slot on the schedule</text>
    <text x="140" y="768" fill="#a2f4b1" font-size="14" font-weight="600" letter-spacing="1">NO PAYMENT REQUIRED UNTIL AFTER THE SESSION</text>

    <rect x="88" y="796" width="36" height="36" rx="10" fill="#a2f4b1"/>
    <text x="106" y="820" fill="#0f1a12" font-size="18" font-weight="700" text-anchor="middle">2</text>
    <text x="140" y="818" fill="#ffffff" font-size="22" font-weight="700">Invite your friends</text>

    <rect x="88" y="852" width="36" height="36" rx="10" fill="#a2f4b1"/>
    <text x="106" y="876" fill="#0f1a12" font-size="18" font-weight="700" text-anchor="middle">3</text>
    <text x="140" y="874" fill="#ffffff" font-size="22" font-weight="700">We train you together</text>

    <rect x="88" y="908" width="36" height="36" rx="10" fill="#a2f4b1"/>
    <text x="106" y="932" fill="#0f1a12" font-size="18" font-weight="700" text-anchor="middle">4</text>
    <text x="140" y="930" fill="#ffffff" font-size="22" font-weight="700">Split the fee how you like</text>
  </g>
</svg>
